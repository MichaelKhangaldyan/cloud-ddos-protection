# /etc/nginx/nginx.conf
# DDoS Protection Reverse Proxy - shield server configuration
# Khangaldyan Mikael, 2026

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    # Special log format for attack analysis
    log_format attack '$remote_addr - $status - $request - $time_local';
    access_log /var/log/nginx/attack.log attack;

    # Rate limiting zone — 1 request per second per IP
    limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
    limit_req_status 429;

    # GLOBAL deny rules (applied to ALL server blocks)
    # This fixes the multi-vhost bypass issue
    include /etc/nginx/blocked_ips.conf;

    include /etc/nginx/custom/*.conf;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # SSL settings
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    gzip on;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
